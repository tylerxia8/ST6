apiVersion: apps/v1
kind: Deployment
metadata:
  name: st6-api
  namespace: st6
  labels:
    app: st6-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: st6-api
  template:
    metadata:
      labels:
        app: st6-api
    spec:
      containers:
        - name: api
          image: ghcr.io/tylerxia8/st6-api:replace-with-tag
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: prod
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: st6-api-secrets
                  key: database-url
            - name: DATABASE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: st6-api-secrets
                  key: database-username
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: st6-api-secrets
                  key: database-password
            - name: AUTH0_ISSUER_URI
              valueFrom:
                secretKeyRef:
                  name: st6-api-secrets
                  key: auth0-issuer-uri
            - name: ST6_CORS_ALLOWED_ORIGINS
              value: https://pa.example.com,https://st6-assets.example.com
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 40
            periodSeconds: 20
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
