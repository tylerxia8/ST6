name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**/*.md"
  pull_request:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**/*.md"

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run test:run
      - run: npm run build
      - run: npx cypress install
      - run: |
          npm run dev &
          for i in {1..30}; do
            curl -fsS http://localhost:5173 && break
            sleep 2
          done
          curl -fsS http://localhost:5173
          npm run e2e

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4
      - working-directory: apps/api
        run: chmod +x gradlew
      - working-directory: apps/api
        run: ./gradlew test jacocoTestReport jacocoTestCoverageVerification

  docker-images:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose config
      - run: docker build -t st6-api:ci apps/api
      - run: >
          docker build
          --build-arg VITE_API_MODE=api
          --build-arg VITE_API_BASE_URL=http://localhost:8080/api
          -f apps/web/Dockerfile
          -t st6-web:ci
          .
