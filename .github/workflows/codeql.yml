name: CodeQL

on:
  push:
    branches: [main]
    paths:
      - "apps/**"
      - "package*.json"
      - ".github/workflows/codeql.yml"
  pull_request:
    branches: [main]
    paths:
      - "apps/**"
      - "package*.json"
      - ".github/workflows/codeql.yml"
  schedule:
    - cron: "21 8 * * 1"

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze-java:
    name: Analyze Java
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: github/codeql-action/init@v4
        with:
          languages: java-kotlin
          build-mode: manual

      - working-directory: apps/api
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon testClasses

      - uses: github/codeql-action/analyze@v4
        with:
          category: codeql-java
          upload: false
          output: codeql-results

      - uses: actions/upload-artifact@v4
        with:
          name: codeql-java-sarif
          path: codeql-results

  analyze-typescript:
    name: Analyze TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          build-mode: none

      - uses: github/codeql-action/analyze@v4
        with:
          category: codeql-typescript
          upload: false
          output: codeql-results

      - uses: actions/upload-artifact@v4
        with:
          name: codeql-typescript-sarif
          path: codeql-results
