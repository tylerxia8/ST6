name: CodeQL

on:
  push:
    branches: [main]
    paths:
      - "apps/**"
      - "package*.json"
      - ".github/workflows/codeql.yml"
  pull_request:
    branches: [main]
    paths:
      - "apps/**"
      - "package*.json"
      - ".github/workflows/codeql.yml"
  schedule:
    - cron: "21 8 * * 1"

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze Java and TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: github/codeql-action/init@v4
        with:
          languages: java-kotlin,javascript-typescript
          build-mode: manual

      - run: npm ci

      - working-directory: apps/api
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon testClasses

      - uses: github/codeql-action/analyze@v4
        with:
          category: codeql-java-typescript
