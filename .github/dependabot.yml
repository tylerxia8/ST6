version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/Chicago
    open-pull-requests-limit: 5
    groups:
      frontend-minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: gradle
    directory: /apps/api
    schedule:
      interval: weekly
      day: monday
      time: "09:30"
      timezone: America/Chicago
    open-pull-requests-limit: 5
    groups:
      backend-minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: docker
    directory: /apps/api
    schedule:
      interval: weekly
      day: monday
      time: "10:00"
      timezone: America/Chicago

  - package-ecosystem: docker
    directory: /apps/web
    schedule:
      interval: weekly
      day: monday
      time: "10:15"
      timezone: America/Chicago

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "10:30"
      timezone: America/Chicago
