services:
  postgres:
    image: postgres:16.4
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-st6}
      POSTGRES_USER: ${POSTGRES_USER:-st6}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-st6}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-st6} -d ${POSTGRES_DB:-st6}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql/data

  api:
    build:
      context: ./apps/api
    environment:
      DATABASE_URL: ${DATABASE_URL:-jdbc:postgresql://postgres:5432/st6}
      DATABASE_USERNAME: ${DATABASE_USERNAME:-st6}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-st6}
      AUTH0_ISSUER_URI: ${AUTH0_ISSUER_URI:-https://example.auth0.com/}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-local}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_MODE: ${VITE_API_MODE:-mock}
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080/api}
    ports:
      - "8088:80"
    depends_on:
      - api

volumes:
  postgres-data:
