spring:
  application:
    name: st6-api
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/st6}
    username: ${DATABASE_USERNAME:st6}
    password: ${DATABASE_PASSWORD:st6}
  flyway:
    enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc.time_zone: UTC
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${AUTH0_ISSUER_URI:https://example.auth0.com/}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

server:
  port: 8080
