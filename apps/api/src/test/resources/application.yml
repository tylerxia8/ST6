spring:
  datasource:
    url: jdbc:h2:mem:st6;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
  flyway:
    enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://test.auth0.local/

st6:
  cors:
    allowed-origins: http://localhost:5173
